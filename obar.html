<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>O Bar - O Jogo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Press Start 2P', cursive; display: flex; flex-direction: column; align-items: center; margin: 0; padding-top: 10px; overflow: hidden; touch-action: none; }
        canvas { border: 4px solid #5d4037; border-radius: 8px; background-color: #000; width: 85vw; max-width: 1000px; height: auto; image-rendering: pixelated; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="telaDoJogo" width="1000" height="650"></canvas>

    <script>
        const canvas = document.getElementById("telaDoJogo");
        const ctx = canvas.getContext("2d");
        const urlBase = "https://raw.githubusercontent.com/fouyerluke/O-Bar---O-Jogo/main/O%20Bar%20-%20O%20Jogo/M%C3%ADdia/";

        // --- VÍDEO DE INTRODUÇÃO ---
        const videoIntro = document.createElement("video");
        videoIntro.src = urlBase + "intro.mp4";
        videoIntro.onended = () => { if(estadoJogo === "intro_video") estadoJogo = "menu_principal"; };

        // --- CARREGAMENTO DE IMAGENS ---
        const imgs = ["inicio.png", "instrucoes.png", "bg2.png", "bg.png", "marcel.png", "cerveja.png", "drink.png", "drink2.png", "creditos.png"];
        const loadedImgs = {};
        imgs.forEach(name => {
            let i = new Image(); i.src = urlBase + name;
            loadedImgs[name.split('.')[0]] = i;
        });

        const charNames = [
            { id: "zeca", nome: "ZECA" }, { id: "suzy", nome: "SUZY" }, { id: "julinho", nome: "JULINHO" },
            { id: "tiffany", nome: "TIFFANY" }, { id: "vitin", nome: "VITIN" }, { id: "jucicleide", nome: "JUCICLEIDE" },
            { id: "cris%20do%20lero%20lero", nome: "CRIS" }, { id: "janete", nome: "JANETE" }, { id: "jorginho", nome: "JORGINHO" },
            { id: "ritinha", nome: "RITINHA" }, { id: "shirlei", nome: "SHIRLEI" }, { id: "valerio", nome: "VALERIO", hGameplay: 155 },
            { id: "marcel", nome: "MARCEL (MODO INFINITO)", especial: true }
        ];

        const listaPersonagens = charNames.map(char => {
            let i = new Image(); i.src = urlBase + char.id + ".png";
            return { ...char, img: i };
        });

        const somBotao = new Audio(urlBase + "botao.mp3");
        const somCerveja = new Audio(urlBase + "cerveja.mp3");
        const somDrink = new Audio(urlBase + "drink.mp3");
        const somTema = new Audio(urlBase + "tema.mp3"); somTema.loop = true;

        function tocarSom(som) { som.currentTime = 0; som.play().catch(e => {}); }

        let estadoJogo = "pre_intro"; // Novo estado para clique inicial
        let selecaoMenu = 0, selecaoPersonagem = 0, paginaSelecao = 0, pontuacao = 0, cameraX = 0;
        let modoMarcel = false, isMobileMode = false, teclas = {};

        let jogador = { x: 100, y: 400, h: 135, v: 4.5, img: null, dir: 1, voando: false, tVoo: 0, imortal: false, tImortal: 0 };
        let ia = { x: 1600, y: 400, h: 135, v: 0.5, img: null, dir: -1 };
        let cervejaItem = { x: 800, y: 400, ativa: true };

        function handleMenuInteraction(x, y) {
            if (estadoJogo === "pre_intro") {
                estadoJogo = "intro_video";
                videoIntro.play();
                return;
            }
            if (estadoJogo === "intro_video") {
                videoIntro.pause();
                estadoJogo = "menu_principal";
                return;
            }
            if (somTema.paused && estadoJogo !== "gameover") somTema.play();

            if (estadoJogo === "menu_principal") {
                if (y > 410 && y < 450) { tocarSom(somBotao); isMobileMode = false; estadoJogo = "menu_selecao"; }
                else if (y > 470 && y < 510) { tocarSom(somBotao); isMobileMode = true; estadoJogo = "menu_selecao"; }
                else if (y > 530 && y < 570) { tocarSom(somBotao); estadoJogo = "menu_instrucoes"; }
                else if (y > 590 && y < 630) { tocarSom(somBotao); estadoJogo = "menu_creditos"; }
            } 
            else if (estadoJogo === "menu_selecao") {
                if (x > 750 && x < 980 && y > 560 && y < 610) {
                    tocarSom(somBotao); paginaSelecao = (paginaSelecao + 1) % 3;
                    selecaoPersonagem = paginaSelecao * 6; return;
                }
                let inicioIndex = paginaSelecao * 6;
                for (let i = 0; i < 6; i++) {
                    let idx = inicioIndex + i; if (!listaPersonagens[idx]) break;
                    let col = i % 3, row = Math.floor(i / 3);
                    let centerX = 250 + col * 250; let py = 120 + row * 210;
                    if (x > centerX - 60 && x < centerX + 60 && y > py && y < py + 180) {
                        selecaoPersonagem = idx; tocarSom(somBotao); iniciarJogo(); return;
                    }
                }
            }
            else if (estadoJogo === "menu_instrucoes" || estadoJogo === "menu_creditos") { tocarSom(somBotao); estadoJogo = "menu_principal"; }
            else if (estadoJogo === "gameover") { tocarSom(somBotao); iniciarJogo(); }
        }

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            handleMenuInteraction(x, y);
        });

        window.addEventListener("keydown", (e) => {
            const k = e.key.toLowerCase(); teclas[k] = true;
            if (estadoJogo === "intro_video") { videoIntro.pause(); estadoJogo = "menu_principal"; return; }
            if (somTema.paused && estadoJogo !== "gameover" && estadoJogo !== "pre_intro") somTema.play();
            if (e.key === "Escape" && estadoJogo !== "menu_principal") { tocarSom(somBotao); estadoJogo = "menu_principal"; return; }

            if (estadoJogo === "menu_principal") {
                if (k === "arrowup" || k === "w") { tocarSom(somBotao); selecaoMenu = (selecaoMenu - 1 + 4) % 4; }
                if (k === "arrowdown" || k === "s") { tocarSom(somBotao); selecaoMenu = (selecaoMenu + 1) % 4; }
                if (e.key === "Enter") {
                    tocarSom(somBotao);
                    if (selecaoMenu === 0) { isMobileMode = false; estadoJogo = "menu_selecao"; }
                    else if (selecaoMenu === 1) { isMobileMode = true; estadoJogo = "menu_selecao"; }
                    else if (selecaoMenu === 2) estadoJogo = "menu_instrucoes";
                    else estadoJogo = "menu_creditos";
                }
            } else if (estadoJogo === "menu_selecao") {
                if (k === "arrowright" || k === "d") { tocarSom(somBotao); selecaoPersonagem = (selecaoPersonagem + 1) % listaPersonagens.length; paginaSelecao = Math.floor(selecaoPersonagem / 6); }
                if (k === "arrowleft" || k === "a") { tocarSom(somBotao); selecaoPersonagem = (selecaoPersonagem - 1 + listaPersonagens.length) % listaPersonagens.length; paginaSelecao = Math.floor(selecaoPersonagem / 6); }
                if (e.key === "Enter") { tocarSom(somBotao); iniciarJogo(); }
            } else if (k === "r" && estadoJogo === "gameover") { tocarSom(somBotao); iniciarJogo(); }
        });
        window.addEventListener("keyup", (e) => teclas[e.key.toLowerCase()] = false);

        function iniciarJogo() {
            pontuacao = 0; jogador.x = 100; jogador.y = 400; 
            const p = listaPersonagens[selecaoPersonagem];
            jogador.img = p.img; jogador.h = p.hGameplay || 135;
            modoMarcel = p.especial;
            if (modoMarcel) spawnVitima(); else { ia.img = loadedImgs.marcel; ia.x = 1600; ia.y = 400; ia.v = 0.5; spawnItens(); }
            estadoJogo = "jogando";
        }

        function spawnVitima() {
            let pAleatorio = listaPersonagens[Math.floor(Math.random() * 12)];
            ia.img = pAleatorio.img; ia.x = Math.random() * 1500 + 100; ia.y = Math.random() * 200 + 300;
            ia.v = 2.5 + (pontuacao * 0.1);
        }

        function spawnItens() {
            cervejaItem = { x: Math.random() * 1600 + 100, y: Math.random() * 200 + 300, ativa: true };
        }

        function desenharSprite(img, x, y, h, dir, opac = 1) {
            if (!img || !img.complete) return;
            let w = (img.width / img.height) * h;
            ctx.save(); ctx.globalAlpha = opac;
            if (dir === -1) { ctx.translate(x + w, y); ctx.scale(-1, 1); ctx.drawImage(img, 0, 0, w, h); }
            else { ctx.drawImage(img, x, y, w, h); }
            ctx.restore();
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (estadoJogo === "pre_intro") {
                ctx.fillStyle = "black"; ctx.fillRect(0,0,1000,650);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "14px 'Press Start 2P'";
                ctx.fillText("CLIQUE PARA INICIAR", 500, 325);
            }
            else if (estadoJogo === "intro_video") {
                ctx.drawImage(videoIntro, 0, 0, 1000, 650);
                ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "8px 'Press Start 2P'"; ctx.textAlign = "right";
                ctx.fillText("ENTER PARA PULAR", 980, 630);
            }
            else if (estadoJogo === "menu_principal") {
                if (loadedImgs.inicio.complete) ctx.drawImage(loadedImgs.inicio, 0, 0, canvas.width, canvas.height);
                ctx.textAlign = "center"; ctx.font = "18px 'Press Start 2P'";
                [["JOGAR", 430], ["MODO MOBILE", 490], ["INSTRUCOES", 550], ["CREDITOS", 610]].forEach((m, i) => {
                    ctx.fillStyle = (selecaoMenu === i) ? "#f1c40f" : "white"; ctx.fillText("> " + m[0], 500, m[1]);
                });
            } else if (estadoJogo === "menu_selecao") {
                ctx.drawImage(loadedImgs.bg2, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "20px 'Press Start 2P'";
                ctx.fillText("QUEM VAI PRO BAR?", 500, 60);
                ctx.font = "10px 'Press Start 2P'"; ctx.fillStyle = "#f1c40f"; ctx.textAlign = "right";
                ctx.fillText("PAGINA " + (paginaSelecao+1) + "/3", 960, 590);
                ctx.textAlign = "center";
                let inicioIndex = paginaSelecao * 6;
                for (let i = 0; i < 6; i++) {
                    let idx = inicioIndex + i; if (!listaPersonagens[idx]) break;
                    let p = listaPersonagens[idx], col = i % 3, row = Math.floor(i / 3);
                    let charW = (p.img && p.img.complete) ? (p.img.width / p.img.height) * 170 : 80;
                    let centerX = 250 + col * 250; let py = 120 + row * 210;
                    if (selecaoPersonagem === idx) { ctx.shadowColor = "#f1c40f"; ctx.shadowBlur = 25; ctx.fillStyle = "#f1c40f"; } 
                    else { ctx.shadowBlur = 0; ctx.fillStyle = "white"; }
                    desenharSprite(p.img, centerX - charW/2, py, 170, 1);
                    ctx.font = "10px 'Press Start 2P'"; ctx.fillText(p.nome, centerX, py + 195);
                }
            } else if (estadoJogo === "jogando") {
                let limY = 220;
                if (teclas.w || teclas.arrowup) jogador.y = Math.max(limY, jogador.y - jogador.v);
                if (teclas.s || teclas.arrowdown) jogador.y = Math.min(650 - jogador.h, jogador.y + jogador.v);
                if (teclas.a || teclas.arrowleft) { jogador.x = Math.max(0, jogador.x - jogador.v); jogador.dir = -1; }
                if (teclas.d || teclas.arrowright) { jogador.x = Math.min(1700, jogador.x + jogador.v); jogador.dir = 1; }
                cameraX = Math.max(0, Math.min(jogador.x - 500, 800));
                ctx.drawImage(loadedImgs.bg, -cameraX, 0, 1800, 650);
                let jCX = jogador.x + 35, jCY = jogador.y + (jogador.h / 2), iCX = ia.x + 35, iCY = ia.y + (ia.h / 2);
                if (modoMarcel) {
                    let dx = ia.x - jogador.x, dy = ia.y - jogador.y, dist = Math.hypot(dx, dy);
                    if (dist < 400) { ia.x += (dx/dist)*ia.v; ia.y += (dy/dist)*ia.v; ia.dir = dx > 0 ? -1 : 1; }
                    ia.x = Math.max(50, Math.min(1750, ia.x)); ia.y = Math.max(220, Math.min(500, ia.y));
                    if (Math.hypot(jCX - (ia.x + 35), jCY - (ia.y + 67)) < 55) { pontuacao++; spawnVitima(); }
                } else {
                    if (ia.x < jogador.x) ia.x += ia.v; else ia.x -= ia.v;
                    if (ia.y < jogador.y) ia.y += ia.v; else ia.y -= ia.v;
                    if (ia.y < 220) ia.y = 220;
                    if (cervejaItem.ativa) {
                        ctx.drawImage(loadedImgs.cerveja, cervejaItem.x - cameraX, cervejaItem.y, 40, 80);
                        if (Math.hypot(jCX - (cervejaItem.x + 20), jCY - (cervejaItem.y + 40)) < 55) { somCerveja.play(); pontuacao++; ia.v += 0.08; spawnItens(); }
                    }
                    if (Math.hypot(jCX - iCX, jCY - iCY) < 55) estadoJogo = "gameover";
                }
                desenharSprite(ia.img, ia.x - cameraX, ia.y, 135, ia.dir);
                desenharSprite(jogador.img, jogador.x - cameraX, jogador.y, jogador.h, jogador.dir);
                ctx.fillStyle = "white"; ctx.textAlign = "left"; ctx.font = "16px 'Press Start 2P'";
                ctx.fillText((modoMarcel ? "MODO INFINITO: " : ": ") + pontuacao, modoMarcel ? 20 : 55, 50);
            } else if (estadoJogo === "gameover") {
                ctx.fillStyle = "black"; ctx.fillRect(0,0,1000,650); ctx.textAlign = "center";
                ctx.fillStyle = "red"; ctx.font = "30px 'Press Start 2P'"; ctx.fillText("GAME OVER", 500, 250);
                ctx.fillStyle = "white"; ctx.font = "16px 'Press Start 2P'"; ctx.fillText("CONTA: " + pontuacao, 500, 350);
                ctx.font = "12px 'Press Start 2P'"; ctx.fillStyle = "#f1c40f"; ctx.fillText("R PARA RECOMECAR", 500, 450);
            } else if (estadoJogo === "menu_creditos") ctx.drawImage(loadedImgs.creditos, 0, 0, 1000, 650);
            else if (estadoJogo === "menu_instrucoes") ctx.drawImage(loadedImgs.instrucoes, 0, 0, 1000, 650);
            requestAnimationFrame(loop);
        } loop();
    </script>
</body>
</html>
